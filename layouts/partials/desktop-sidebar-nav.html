<nav aria-label="Site sections" class="w-full flex flex-col justify-between h-full">
  <ul class="flex flex-col gap-1 p-0 m-0 list-none">
    {{- range site.Data.nav.primary }}
      <li>
        <a href="{{ .href }}" class="nav-chip w-full justify-start" data-nav-sound>
          <span class="nav-chip__bracket">[</span><span class="nav-chip__label">{{ .label }}</span><span class="nav-chip__bracket">]</span>
        </a>
      </li>
    {{- end }}
  </ul>

  <div class="mt-6 pt-4 border-t border-text/20">
    <div class="flex items-center gap-2 mb-2 text-xs text-accentText/80 font-mono">
      <span class="inline-block w-1.5 h-1.5 rounded-full bg-highlight animate-pulse"></span>
      <span>~/subscribe</span>
    </div>
    <p class="mt-0 mb-3 text-sm text-text/75">Notes + reading list in your inbox.</p>
    <form action="https://buttondown.email/api/emails/embed-subscribe/guidefari" method="post"
      target="popupwindow"
      class="flex flex-col gap-2">
      <label for="bd-email-nav" class="sr-only">Email address</label>
      <input type="email" name="email" id="bd-email-nav" required
        placeholder="you@domain.com"
        class="w-full px-3 py-2 font-mono text-sm bg-transparent border rounded-sm border-text/40 text-text placeholder:text-text/40 focus:outline-none focus:border-highlight focus:ring-1 focus:ring-highlight" />
      <button type="submit"
        class="px-4 py-2 font-mono text-sm font-semibold tracking-wide uppercase transition border rounded-sm border-highlight bg-highlight text-black hover:bg-transparent hover:text-highlight focus:outline-none focus:ring-2 focus:ring-highlight">
        Subscribe
      </button>
    </form>
  </div>
</nav>
