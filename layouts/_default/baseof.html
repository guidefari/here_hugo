<!doctype html>
<html>
  {{- partial "head.html" . -}} {{- partial "header.html" . -}}

  <body class="flex flex-col p-4 {{ if .Params.hide_footer }}h-dvh overflow-hidden{{ else }}min-h-dvh{{ end }}">
    <div class="w-full grow{{ if not .Params.full_width }} content{{ end }}">{{- block "main" . }}{{- end }}</div>
    {{- if not .Params.hide_footer }}{{- partial "footer.html" . -}}{{ end -}} {{- partial "search.html" . -}}
  </body>
  {{ if .Store.Get "hasMermaid" }}
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true });
  </script>
  {{ end }}
</html>
