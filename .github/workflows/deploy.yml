name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh:
        description: "Run sst refresh before deploying"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-prod

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Hugo
        env:
          HUGO_VERSION: "0.152.2"
        run: |
          curl -sSLO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          hugo version

      - run: bun install

      - name: Remove system-wide Pulumi
        run: sudo rm -f /usr/local/bin/pulumi*

      - name: Check for refresh flag in commit message
        id: check-refresh
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q '\[refresh\]'; then
            echo "refresh=true" >> $GITHUB_OUTPUT
          else
            echo "refresh=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
        run: |
          if [ "${{ inputs.refresh || steps.check-refresh.outputs.refresh }}" = "true" ]; then
            bun run sst refresh --stage=prod
          fi
          bun run sst deploy --stage=prod
